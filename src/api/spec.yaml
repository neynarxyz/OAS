  /v2/farcaster/nft/mint/:
    get:
      description: Simulates mint calldata for the given recipients, contract, and network. Useful for previewing calldata and ABI before minting.
      externalDocs:
        url: https://docs.neynar.com/reference/simulate-nft-mint
      operationId: simulate-nft-mint
      parameters:
        - description: JSON array of recipients (same structure as POST).
          in: query
          name: recipients
          required: true
          schema:
            type: string
        - description: Ethereum address
          in: query
          name: nft_contract_address
          required: true
          schema:
            example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
            pattern: ^0x[a-fA-F0-9]{40}$
            title: EthAddress
            type: string
        - description: Network to mint on.
          in: query
          name: network
          required: true
          schema:
            enum:
              - base
              - optimism
              - base-sepolia
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulateNftMintResponse'
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZodError'
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Resource not found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
      summary: Simulate NFT mint calldata
      tags:
        - Onchain
    post:
      description: Mints an NFT to one or more recipients on a specified network and contract, using a configured server wallet. Contact us to set up your wallet configuration if you don't have one.
      externalDocs:
        url: https://docs.neynar.com/reference/mint-nft
      operationId: mint-nft
      parameters:
        - $ref: '#/components/parameters/WalletIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              description: Request body for NFT minting operation.
              properties:
                async:
                  description: If true, returns immediately after sending the transaction.
                  example: false
                  type: boolean
                contract_address:
                  description: Ethereum address
                  example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
                  pattern: ^0x[a-fA-F0-9]{40}$
                  title: EthAddress
                  type: string
                network:
                  description: Network to mint on.
                  enum:
                    - base
                    - optimism
                    - base-sepolia
                  example: base
                  type: string
                recipients:
                  description: List of recipients to mint to (1-200 recipients allowed).
                  items:
                    anyOf:
                      - properties:
                          address:
                            description: Ethereum address
                            example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
                            pattern: ^0x[a-fA-F0-9]{40}$
                            title: EthAddress
                            type: string
                          fid:
                            not: {}
                          quantity:
                            default: 1
                            description: Quantity to mint (must be at least 1). Defaults to 1.
                            example: 1
                            minimum: 1
                            type: integer
                        required:
                          - address
                        type: object
                      - properties:
                          address:
                            not: {}
                          fid:
                            description: The unique identifier of a farcaster user or app (unsigned integer)
                            example: 3
                            format: int32
                            minimum: 0
                            title: Fid
                            type: integer
                          quantity:
                            default: 1
                            description: Quantity to mint (must be at least 1). Defaults to 1.
                            example: 1
                            minimum: 1
                            type: integer
                        required:
                          - fid
                        type: object
                    description: NFT mint recipient. Exactly one of "address" or "fid" must be set.
                  maxItems: 200
                  minItems: 1
                  type: array
              required:
                - network
                - contract_address
                - recipients
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Response for NFT minting operation.
                properties:
                  transactions:
                    description: Array of per-recipient mint results (success or error).
                    items:
                      oneOf:
                        - description: Successful mint transaction.
                          properties:
                            receipt:
                              description: Transaction receipt (if async is false).
                              nullable: true
                              properties:
                                block_number:
                                  type: string
                                gas_used:
                                  type: string
                                status:
                                  type: string
                              required:
                                - status
                                - gas_used
                                - block_number
                              type: object
                            recipient:
                              description: Resolved mint recipient.
                              properties:
                                address:
                                  $ref: '#/components/schemas/EthAddress'
                                fid:
                                  $ref: '#/components/schemas/Fid'
                                quantity:
                                  minimum: 1
                                  type: integer
                                tokens:
                                  description: Minted token IDs parsed from Transfer events (sync mode only).
                                  items:
                                    properties:
                                      token_id:
                                        type: string
                                    required:
                                      - token_id
                                    type: object
                                  type: array
                              required:
                                - address
                                - quantity
                              type: object
                            transaction_hash:
                              $ref: '#/components/schemas/PrefixedHexString'
                          required:
                            - recipient
                            - transaction_hash
                          type: object
                        - description: Failed mint for a single recipient.
                          properties:
                            error:
                              description: Error message for this recipient.
                              example: No supported mint project detected
                              type: string
                            recipient:
                              description: Mint recipient that failed.
                              properties:
                                address:
                                  $ref: '#/components/schemas/EthAddress'
                                fid:
                                  $ref: '#/components/schemas/Fid'
                                quantity:
                                  minimum: 1
                                  type: integer
                              required:
                                - quantity
                              type: object
                          required:
                            - recipient
                            - error
                          type: object
                    type: array
                required:
                  - transactions
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZodError'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Unauthorized
        '402':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Payment Required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Resource not found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
      summary: Mint NFT(s)
      tags:
        - Onchain
