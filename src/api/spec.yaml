  /v2/farcaster/fungible/trades/:
    get:
      description: Get recent trades for a specific fungible within a timeframe. Returns trades ordered by timestamp (most recent first).
      externalDocs:
        url: https://docs.neynar.com/reference/fetch-fungible-trades
      operationId: fetch-fungible-trades
      parameters:
        - in: query
          name: network
          required: true
          schema:
            enum:
              - base
            type: string
        - description: Contract address
          in: query
          name: address
          required: true
          schema:
            type: string
        - description: Time window for trades e.g. "1h", "6h", "12h", "24h", "7d"
          in: query
          name: time_window
          schema:
            default: 24h
            enum:
              - 1h
              - 6h
              - 12h
              - 24h
              - 7d
            type: string
        - description: Minimum USD amount to filter trades
          in: query
          name: min_amount_usd
          schema:
            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  object:
                    enum:
                      - fungible_trades
                    type: string
                  trades:
                    items:
                      properties:
                        object:
                          enum:
                            - trade
                          type: string
                        pool:
                          properties:
                            address:
                              type: string
                            object:
                              enum:
                                - pool
                              type: string
                            protocol_family:
                              type: string
                            protocol_version:
                              type: string
                          required:
                            - object
                            - address
                          type: object
                        trader:
                          $ref: '#/components/schemas/UserDehydrated'
                        transaction:
                          properties:
                            hash:
                              type: string
                            net_transfer:
                              properties:
                                object:
                                  enum:
                                    - net_transfer
                                  type: string
                                receiving_fungible:
                                  $ref: '#/components/schemas/FungibleBalance'
                                sending_fungible:
                                  $ref: '#/components/schemas/FungibleBalance'
                              required:
                                - object
                                - receiving_fungible
                                - sending_fungible
                              type: object
                            network:
                              properties:
                                name:
                                  type: string
                                object:
                                  enum:
                                    - network
                                  type: string
                              required:
                                - object
                                - name
                              type: object
                          required:
                            - hash
                            - network
                            - net_transfer
                          type: object
                      required:
                        - object
                        - trader
                        - transaction
                      type: object
                    type: array
                required:
                  - object
                  - trades
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
      summary: Get fungible trades
      tags:
        - Onchain
