                          type: string
                        target:
                          description: Deployment target (e.g., production, preview)
                          type: string
                      required:
                        - project_id
                        - deployment_url
                        - deployment_state
                        - created_at
                      type: object
                    updated_at:
                      description: Last update timestamp
                      format: date-time
                      nullable: true
                      type: string
                    url:
                      description: Public URL for the deployment
                      format: uri
                      type: string
                  required:
                    - id
                    - deleted_at
                    - updated_at
                    - created_at
                    - namespace
                    - name
                    - is_ready
                    - generated_app_exists
                    - generated_app_serving
                  type: object
                type: array
          description: Success
        '400':
          content:
            application/json:
              schema:
                properties:
