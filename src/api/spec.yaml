                                  type: string
                              required:
                                - in_usd
                              type: object
                            symbol:
                              description: The token symbol e.g. "ETH"
                              type: string
                            total_supply:
                              description: The total supply of the token
                              nullable: true
                              type: string
                          required:
                            - object
                            - network
                            - name
                            - symbol
                            - address
                            - decimals
                            - total_supply
                            - logo
                          type: object
                        object:
                          enum:
                            - trending_fungible
                          type: string
                      required:
                        - object
                        - fungible
                      type: object
                    type: array
                required:
                  - trending
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
