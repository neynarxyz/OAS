                    type: boolean
                required:
                  - success
                  - error
                type: object
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                  success:
                    enum:
                      - false
                    type: boolean
                required:
                  - success
                  - error
