                          type: array
                        isPrimary:
                          description: Whether this is the primary key index
                          type: boolean
                        isUnique:
                          description: Whether the index enforces uniqueness
                          type: boolean
                        name:
                          description: Index name
                          type: string
                      required:
                        - name
                        - columns
                        - isUnique
                        - isPrimary
                      type: object
                    type: array
                  primaryKeyColumns:
                    description: Primary key column names
                    items:
                      type: string
                    type: array
                  tableName:
                    description: Table name
                    type: string
                required:
                  - tableName
                  - columns
                  - indexes
                  - foreignKeys
                  - primaryKeyColumns
                type: object
          description: Success
