  /v2/signature/x402/:
    post:
      description: Create a signature for a given x402 resource using the specified wallet.
      externalDocs:
        url: https://docs.neynar.com/reference/create-x402-signature
      operationId: create-x402-signature
      parameters:
        - $ref: '#/components/parameters/WalletIdHeader'
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                payment_requirements:
                  properties:
                    accepts:
                      items:
                        properties:
                          asset:
                            description: Ethereum address
                            example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
                            pattern: ^0x[a-fA-F0-9]{40}$
                            title: EthAddress
                            type: string
                          description:
                            type: string
                          extra:
                            additionalProperties: {}
                            nullable: true
                            type: object
                          maxAmountRequired:
                            type: string
                          maxTimeoutSeconds:
                            type: number
                          mimeType:
                            type: string
                          network:
                            enum:
                              - base
                              - base-sepolia
                            type: string
                          outputSchema:
                            additionalProperties: {}
                            nullable: true
                            type: object
                          payTo:
                            description: Ethereum address
                            example: '0x5a927ac639636e534b678e81768ca19e2c6280b7'
                            pattern: ^0x[a-fA-F0-9]{40}$
                            title: EthAddress
                            type: string
                          resource:
                            format: uri
                            type: string
                          scheme:
                            enum:
                              - exact
                            type: string
                        required:
                          - scheme
                          - network
                          - maxAmountRequired
                          - asset
                          - payTo
                          - resource
                          - description
                          - maxTimeoutSeconds
                        type: object
                      minItems: 1
                      type: array
                    x402Version:
                      enum:
                        - 1
                      type: number
                  required:
                    - x402Version
                    - accepts
                  type: object
              required:
                - payment_requirements
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  network:
                    enum:
                      - base
                      - base-sepolia
                    type: string
                  payload:
                    properties:
                      authorization:
                        properties:
                          from:
                            $ref: '#/components/schemas/EthAddress'
                          nonce:
                            pattern: ^0x[a-fA-F0-9]{64}$
                            type: string
                          to:
                            $ref: '#/components/schemas/EthAddress'
                          validAfter:
                            type: string
                          validBefore:
                            type: string
                          value:
                            type: string
                        required:
                          - from
                          - to
                          - value
                          - validAfter
                          - validBefore
                          - nonce
                        type: object
                      signature:
                        pattern: ^0x[a-fA-F0-9]{130}$
                        type: string
                    required:
                      - signature
                      - authorization
                    type: object
                  scheme:
                    enum:
                      - exact
                    type: string
                  x402Version:
                    enum:
                      - 1
                    type: number
                required:
                  - x402Version
                  - scheme
                  - network
                  - payload
                type: object
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Server Error
      summary: Create x402 signature
      tags:
        - Onchain
  /v2/stp/subscription_check/:
    get:
      description: Check if a wallet address is subscribed to a given STP (Hypersub) contract.
      externalDocs:
        url: https://docs.neynar.com/reference/fetch-subscription-check
      operationId: fetch-subscription-check
      parameters:
        - description: Comma separated list of Ethereum addresses, up to 350 at a time
          in: query
          name: addresses
          required: true
          schema:
            example: 0xedd3783e8c7c52b80cfbd026a63c207edc9cbee7,0x5a927ac639636e534b678e81768ca19e2c6280b7
            type: string
            x-comma-separated: true
        - description: Ethereum address of the STP contract
          in: query
          name: contract_address
          required: true
          schema:
            example: '0x76ad4cb9ac51c09f4d9c2cadcea75c9fa9074e5b'
            type: string
        - description: Chain ID of the STP contract
          in: query
          name: chain_id
          required: true
          schema:
            example: '8453'
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckResponse'
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
          description: Bad Request
      summary: Hypersub subscription check
      tags:
        - Subscribers
  /v2/studio/credit-drops/:
    get:
      description: Returns the most recent credit drop for the authenticated user. Returns the drop regardless of claimed/expired status.
      externalDocs:
        url: https://docs.neynar.com/reference/get-credit-drop
      operationId: get-credit-drop
      parameters:
        - description: Farcaster ID of the user
          in: query
          name: fid
          required: true
          schema:
            example: 3
            format: int32
            minimum: 0
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  allowance_expires_at:
                    description: 'Timestamp at which the drop stops contributing to the effective CU limit. Stamped by the credit-drop job at insert time (default: created_at + 24h).'
                    format: date-time
                    type: string
                  claimed:
                    description: Whether the credit drop has been claimed
                    type: boolean
                  created_at:
                    description: When the credit drop was generated
                    format: date-time
                    type: string
                  credits_remaining:
                    description: reward_amount - credits_used, clamped at 0. Spendable only until allowance_expires_at.
                    nullable: true
                    type: number
                  credits_used:
                    description: Portion of this drop already consumed against STUDIO CU usage (incremented by the CU sync). Forfeited at allowance_expires_at if unused.
                    type: number
                  expired:
                    description: Whether the credit drop's allowance window has closed (NOW() >= allowance_expires_at). Once true, the drop no longer contributes to the effective CU limit; any unused portion is forfeited.
                    type: boolean
                  percentile_score:
                    description: Percentile rank within 7-day global distribution
                    maximum: 1
                    minimum: 0
                    nullable: true
                    type: number
                  raw_score:
                    description: Raw quality score from 0 to 1
                    maximum: 1
                    minimum: 0
                    nullable: true
                    type: number
                  reward_amount:
                    description: Credit reward amount
                    nullable: true
                    type: number
                required:
                  - created_at
                  - raw_score
                  - percentile_score
                  - reward_amount
                  - claimed
                  - credits_used
                  - credits_remaining
                  - allowance_expires_at
                  - expired
                type: object
          description: Success
        '402':
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: string
                  message:
                    type: string
                required:
                  - message
                  - code
                type: object
          description: Payment Required
        '404':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                required:
                  - message
                type: object
          description: Resource not found
      security:
        - ApiKeyAuth: []
      summary: Get most recent credit drop
      tags:
        - studio
  /v2/studio/credit-drops/claim:
    post:
      description: Claims the most recent credit drop for the authenticated user. The drop's allowance is surfaced dynamically until expires_at and does not mutate extra_credits. Only drops created within the past 24 hours can be claimed.
      externalDocs:
        url: https://docs.neynar.com/reference/claim-credit-drop
      operationId: claim-credit-drop
      requestBody:
        content:
          application/json:
            schema:
              properties:
                fid:
                  description: Farcaster ID of the user
                  example: 3
                  format: int32
                  minimum: 0
                  type: integer
              required:
                - fid
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  claimed:
                    enum:
                      - true
                    type: boolean
                  new_extra_credits:
                    description: New total extra credits balance
                    type: number
                  reward_amount:
                    description: Amount of credits added
                    type: number
                required:
                  - claimed
                  - reward_amount
                  - new_extra_credits
                type: object
          description: Success
        '402':
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: string
                  message:
                    type: string
                required:
                  - message
                  - code
                type: object
          description: Payment Required
        '404':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                required:
                  - message
                type: object
          description: Resource not found
        '409':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                required:
                  - message
                type: object
          description: Conflict
        '410':
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                required:
                  - message
                type: object
          description: Gone
      security:
        - ApiKeyAuth: []
      summary: Claim credit drop
      tags:
        - studio
  /v2/studio/deployment/:
    delete:
      description: 'Deletes a specific miniapp generator deployment or all deployments for a FID. If deployment_id or name is provided, deletes single deployment. If only FID is provided, deletes all deployments for that FID. Requires API key authentication. Note: Studio CU is tracked based on LLM token usage, not per API call.'
      externalDocs:
        url: https://docs.neynar.com/reference/delete-deployment
      operationId: delete-deployment
      requestBody:
        content:
          application/json:
            schema:
              properties:
                deployment_id:
                  description: Deployment ID (UUID). If provided, deletes this specific deployment.
                  format: uuid
                  type: string
                fid:
                  description: Farcaster ID of the user
                  example: 3
                  format: int32
                  minimum: 0
                  type: integer
                name:
                  description: Kubernetes deployment name. If not provided and deployment_id not provided, all deployments for the FID will be deleted
                  type: string
                namespace:
                  description: Optional Kubernetes namespace. If not provided, will query for the active namespace for the given FID.
                  type: string
              required:
                - fid
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  deletedCount:
                    type: number
                  success:
