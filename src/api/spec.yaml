                    description: Foreign key relationships
                    items:
                      properties:
                        columnName:
                          description: Local column name
                          type: string
                        constraintName:
                          description: Constraint name
                          type: string
                        referencedColumn:
                          description: Referenced column name
                          type: string
                        referencedTable:
                          description: Referenced table name
                          type: string
                      required:
                        - constraintName
                        - columnName
                        - referencedTable
                        - referencedColumn
                      type: object
                    type: array
                  indexes:
                    description: Table indexes
                    items:
                      properties:
                        columns:
                          description: Columns in the index
                          items:
