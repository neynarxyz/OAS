            default: 24h
            enum:
              - 1h
              - 6h
              - 12h
              - 24h
              - 7d
            example: 24h
            type: string
        - description: Channel ID to filter trending casts. Less active channels might have no casts in the time window selected. Provide either `channel_id` or `parent_url`, not both.
          in: query
